<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Kooply Bird - Local Edition</title>
    <link href="https://fonts.cdnfonts.com/css/04b-19" rel="stylesheet">
    <style>
        :root {
            --sky: #70c5ce;
            --pipe: #73bf2e;
            --fb-font: '04b_19', sans-serif; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: var(--fb-font);
        }
        #game-container {
            position: relative; width: 100%; height: 100%;
            max-width: 500px; background: var(--sky); overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20;
        }
        .logo-box { display: flex; margin-bottom: 150px; transform: translateY(-50px); }
        .letter {
            font-size: 3.8rem; display: inline-block;
            animation: bounceLetter 0.6s infinite alternate; letter-spacing: 2px;
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0px 7px 0 #000;
        }
        @keyframes bounceLetter { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        #score-text {
            position: absolute; top: 10%; width: 100%;
            text-align: center; font-size: 5.5rem; color: white; z-index: 10; pointer-events: none;
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0px 6px 0 #000;
        }
        .panel {
            background: #ded895; border: 5px solid #543847;
            padding: 20px; width: 70%; border-radius: 10px;
            text-align: center; box-shadow: 0 10px 0 #000;
        }
        .panel h2 { color: #e67e22; font-size: 3rem; margin-bottom: 20px; text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; }
        .ok-btn {
            margin-top: 20px; padding: 10px 40px;
            background: #73bf2e; color: white; border: 4px solid #fff; font-size: 1.8rem;
            font-family: var(--fb-font); cursor: pointer; box-shadow: 0 6px 0 #558022;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-text" class="hidden">0</div>
    <div id="start-screen" class="overlay" onclick="startGame()">
        <div class="logo-box" id="kooply-logo"></div>
        <p style="color: white; margin-top: 10px; font-size: 1.8rem; text-shadow: 3px 3px 0 #000; cursor: pointer;">TAP TO START</p>
    </div>
    <div id="end-screen" class="overlay hidden">
        <div class="panel">
            <h2>GAME OVER</h2>
            <div style="display: flex; justify-content: space-around; font-weight: bold; color: #543847;">
                <div>SCORE<br><span id="curr-score" style="font-size: 2.5rem;">0</span></div>
                <div>BEST<br><span id="best-score" style="font-size: 2.5rem;">0</span></div>
            </div>
            <button class="ok-btn" onclick="resetToMenu()">OK</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreHud = document.getElementById('score-text');

    // --- LOCAL SOUND FILES ---
    // Make sure these files are in the same folder as this HTML file
    const sndWing = new Audio('wing.mp3'); 
    const sndPoint = new Audio('point.mp3'); 
    const sndHit = new Audio('die.mp3'); 

    // Sound Helper with Error Catching
    function playSnd(audio) {
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Sound error: Click screen first or check file names."));
    }

    let bird, pipes, frame, score, gameActive = false, isReady = true;
    let highScore = localStorage.getItem('kooply-high') || 0;

    const letters = "KOOPLYBIRD";
    const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF3', '#FFA500', '#ADFF2F', '#FFD700', '#FFFFFF'];
    const logoDiv = document.getElementById('kooply-logo');
    letters.split('').forEach((l, i) => {
        const s = document.createElement('span');
        s.innerText = l; s.className = 'letter';
        s.style.color = colors[i % colors.length];
        s.style.animationDelay = (i * 0.1) + 's';
        logoDiv.appendChild(s);
    });

    function resize() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.onresize = resize; resize();

    function init() {
        bird = { x: canvas.width * 0.25, y: canvas.height * 0.5, v: 0, g: 0.25, j: -5.2 };
        pipes = []; frame = 0; score = 0;
    }

    function resetToMenu() {
        isReady = true;
        document.getElementById('end-screen').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        scoreHud.classList.add('hidden');
        init();
    }

    function startGame() {
        if(!isReady) return;
        isReady = false; 
        gameActive = true;
        document.getElementById('start-screen').classList.add('hidden');
        scoreHud.classList.remove('hidden');
        scoreHud.innerText = "0";
        bird.v = bird.j;
        playSnd(sndWing); // First jump sound
    }

    function drawScenery() {
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        for(let i=0; i<3; i++) {
            let x = (frame * 0.5 + i * 250) % (canvas.width + 100) - 50;
            ctx.beginPath(); ctx.arc(x, 80, 25, 0, Math.PI*2); ctx.arc(x+20, 70, 35, 0, Math.PI*2); ctx.arc(x+45, 80, 25, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = "#4ca3ab";
        for(let i=0; i<12; i++) {
            let bx = (i * 65) - (frame % 65);
            let bh = 130 + Math.sin(i * 2) * 40;
            ctx.fillRect(bx, canvas.height - bh - 20, 55, bh);
        }
    }

    function drawBird() {
        if (!gameActive) return;
        ctx.save(); 
        ctx.translate(bird.x, bird.y);
        ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.v * 0.1)));
        ctx.fillStyle = "#f1c40f"; ctx.strokeStyle = "#000"; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.ellipse(0, 0, 18, 13, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(10, -5, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(12, -5, 2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.moveTo(12, 2); ctx.lineTo(25, 7); ctx.lineTo(12, 12); ctx.fill(); ctx.stroke();
        ctx.restore();
    }

    function update() {
        if (!gameActive) return;
        bird.v += bird.g;
        bird.y += bird.v;
        if (frame % 100 === 0) {
            let gap = 190; 
            let top = Math.random() * (canvas.height - gap - 200) + 100;
            pipes.push({ x: canvas.width, t: top, b: canvas.height - top - gap, p: false });
        }
        pipes.forEach((p, i) => {
            p.x -= 3;
            if (bird.x + 15 > p.x && bird.x - 15 < p.x + 60) {
                if (bird.y - 10 < p.t || bird.y + 10 > canvas.height - p.b) {
                    playSnd(sndHit); 
                    endGame();
                }
            }
            if (!p.p && bird.x > p.x + 60) { 
                score++; 
                p.p = true; 
                scoreHud.innerText = score; 
                playSnd(sndPoint); 
            }
            if (p.x < -70) pipes.splice(i, 1);
        });
        if (bird.y > canvas.height || bird.y < 0) { 
            playSnd(sndHit); 
            endGame(); 
        }
        frame++;
    }

    function endGame() {
        gameActive = false;
        if (score > highScore) { highScore = score; localStorage.setItem('kooply-high', highScore); }
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('curr-score').innerText = score;
        document.getElementById('best-score').innerText = highScore;
    }

    function draw() {
        ctx.fillStyle = "#70c5ce"; ctx.fillRect(0,0, canvas.width, canvas.height);
        drawScenery();
        pipes.forEach(p => {
            ctx.fillStyle = "#73bf2e"; ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
            ctx.fillRect(p.x, 0, 60, p.t); ctx.strokeRect(p.x, 0, 60, p.t);
            ctx.fillRect(p.x, canvas.height - p.b, 60, p.b); ctx.strokeRect(p.x, canvas.height - p.b, 60, p.b);
        });
        ctx.fillStyle = "#ded895"; ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
        drawBird();
        if(isReady) frame++;
    }

    const control = (e) => { 
        if(isReady) startGame();
        else if(gameActive) { 
            bird.v = bird.j; 
            playSnd(sndWing); 
        }
    };
    
    window.onmousedown = control;
    window.ontouchstart = (e) => { 
        if(e.target.tagName !== 'BUTTON') { 
            e.preventDefault(); 
            control(); 
        } 
    };

    init();
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
